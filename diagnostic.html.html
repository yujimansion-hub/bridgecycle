<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRIDGE CYCLE | 開業力6軸診断（GATE）</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --navy: #0B1927; --gold: #C6A24A; --gold-l: #e8c97a;
            --white: #f5f0e8; --gray: #8a9ab0; --border: rgba(198,162,74,0.25);
            --success: #4caf87; --card: rgba(255,255,255,0.04);
        }
        body {
            background: var(--navy); color: var(--white);
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif; margin: 0; padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 2rem; border-radius: 8px; margin-bottom: 2rem; }
        h1 span { color: var(--gold); }
        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 1rem;
        }
        .btn-p { background: var(--gold); color: var(--navy); }
        .btn-p:hover { background: var(--gold-l); }
        .btn-bank { background: transparent; border: 1px solid var(--success); color: var(--success); }
        
        /* 診断パーツ */
        .q-row { margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1rem; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .opt-btn {
            background: transparent; border: 1px solid var(--border); color: var(--gray);
            padding: 10px; cursor: pointer; text-align: left; font-size: 0.8rem;
        }
        .opt-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(198,162,74,0.1); }
        
        /* 銀行判定パーツ */
        .bank-box { border: 1px solid var(--success); background: rgba(76, 175, 135, 0.05); padding: 1.5rem; border-radius: 4px; }
        .readiness-text { font-size: 1.1rem; font-weight: bold; color: var(--success); margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-intro" class="card">
        <h1>開業力 <span>6軸診断</span></h1>
        <p>創業融資を“持ち込みやすい案件”に整えるための実務整理（GATE）</p>
        <div style="margin: 2rem 0;">
            <label>希望業態</label>
            <select id="biz-type" style="width:100%; padding:10px; margin-top:5px; background:#1a2a3a; color:white; border:1px solid var(--border);">
                <option value="居酒屋・バル">居酒屋・バル</option>
                <option value="カフェ・喫茶">カフェ・喫茶</option>
                <option value="ラーメン・麺類">ラーメン・麺類</option>
                <option value="小売・その他">小売・その他</option>
            </select>
        </div>
        <button class="btn btn-p" onclick="start()">診断を開始する</button>
    </div>

    <div id="view-diag" class="card" style="display:none;">
        <h2 id="sec-title"></h2>
        <div id="q-container"></div>
        <button id="next-btn" class="btn btn-p" onclick="next()" disabled>次へ進む</button>
    </div>

    <div id="view-res" style="display:none;">
        <div class="card" style="text-align:center;">
            <h2>総合スコア</h2>
            <div id="total-score" style="font-size: 4rem; color:var(--gold);">0</div>
            <p>開業の解像度スコア</p>
            <canvas id="radarChart" style="max-height: 300px; margin: 20px 0;"></canvas>
        </div>

        <div class="bank-box">
            <div style="font-size:0.7rem; color:var(--success);">BANK READINESS</div>
            <div class="bank-title">金融機関・融資担当者向け判定</div>
            <div id="readiness" class="readiness-text">分析中...</div>
            <p style="font-size:0.8rem; color:var(--gray);">※本診断はSTEP 2の事前整理として機能し、審査負荷を大幅に軽減します。</p>
            <button class="btn btn-bank" onclick="alert('PDF生成機能をシミュレートします')">銀行提出用サマリーを書き出す</button>
        </div>
        
        <button class="btn btn-p" style="margin-top:2rem;" onclick="location.reload()">診断をやり直す</button>
    </div>
</div>

<script>
    const SECTIONS = [
        {title: "概念・コンセプト", qs: ["ターゲットは明確か", "強みは一言で言えるか", "メニュー構成は固まったか", "独自性は検証済みか"]},
        {title: "収益構造・財務", qs: ["売上試算に根拠はあるか", "家賃比率は10%内か", "自己資金は十分か", "損益分岐点を把握したか"]},
        {title: "商圏・顧客動線", qs: ["人流調査は済んだか", "競合の穴は見えたか", "視認性は確保できるか", "曜日別変動を考慮したか"]},
        {title: "集客・リピート", qs: ["SNS戦略は具体化か", "MEO対策の準備はか", "リピート施策はあるか", "プレオープンの計画はか"]}
    ];

    let step = 0;
    let scores = [];

    function start() {
        document.getElementById('view-intro').style.display='none';
        document.getElementById('view-diag').style.display='block';
        render();
    }

    function render() {
        const s = SECTIONS[step];
        document.getElementById('sec-title').innerText = s.title;
        const container = document.getElementById('q-container');
        container.innerHTML = s.qs.map((q, i) => `
            <div class="q-row">
                <p>${q}</p>
                <div class="opt-grid">
                    <button class="opt-btn" onclick="answer(${step},${i},1,this)">未着手</button>
                    <button class="opt-btn" onclick="answer(${step},${i},3,this)">検討中</button>
                    <button class="opt-btn" onclick="answer(${step},${i},5,this)">準備完了</button>
                </div>
            </div>
        `).join('');
        document.getElementById('next-btn').disabled = true;
    }

    function answer(s, q, v, btn) {
        if(!scores[s]) scores[s] = [];
        scores[s][q] = v;
        const parent = btn.parentElement;
        Array.from(parent.children).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const answered = scores[step] ? scores[step].filter(n => n).length : 0;
        if(answered === 4) document.getElementById('next-btn').disabled = false;
    }

    function next() {
        if(step < SECTIONS.length - 1) {
            step++; render();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('view-diag').style.display='none';
        document.getElementById('view-res').style.display='block';

        const rawScores = scores.map(s => s.reduce((a,b)=>a+b, 0));
        const total = Math.round((rawScores.reduce((a,b)=>a+b, 0) / 80) * 100);
        document.getElementById('total-score').innerText = total;

        // 銀行判定
        let r = "";
        if(total >= 80) r = "【融資推奨】計画は成熟しています。即時審査可能です。";
        else if(total >= 50) r = "【要事前整理】特定項目の補強が必要です。BRIDGE CYCLEが伴走します。";
        else r = "【整理依頼】計画が未成熟です。STEP 2の再整理を推奨します。";
        document.getElementById('readiness').innerText = r;

        // チャート表示
        new Chart(document.getElementById('radarChart'), {
            type: 'radar',
            data: {
                labels: SECTIONS.map(s=>s.title),
                datasets: [{
                    label: '解像度', data: rawScores,
                    backgroundColor: 'rgba(198, 162, 74, 0.2)', borderColor: '#C6A24A'
                }]
            },
            options: { scales: { r: { min: 0, max: 20 } } }
        });
    }
</script>
</body>
</html>
